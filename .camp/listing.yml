name: Logstore xAPI
summary: Send xAPI statements from the Moodle logstore to your LRS.
description: |
  Logstore xAPI captures Moodle activity (events) and sends it to a Learning Record Store (LRS) as xAPI statements.
  Once configured, events like course views, quiz attempts, assignment submissions, and forum posts are automatically recorded in your LRS.
labels:
  - fully-free
  - commercial-support-available
